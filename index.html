<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ragdoll Archers</title>
  <link rel="icon" type="image/png" href="spinner.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div id="unity-container" class="unity-shell unity-desktop">
      <canvas id="unity-canvas" tabindex="-1" aria-label="Ragdoll Archers game canvas"></canvas>
      <div id="loading-cover" class="loading-cover">
        <div class="loading-panel">
          <div id="unity-logo" class="logo-wrap">
            <img src="logo.jpeg" alt="Ragdoll Archers logo">
          </div>
          <div class="progress-spinner-container">
            <div class="spinner-left"><img src="spinner.png" alt=""></div>
            <div id="unity-progress-bar-empty">
              <div id="unity-progress-bar-full"></div>
            </div>
            <div class="spinner-right"><img src="spinner.png" alt=""></div>
          </div>
          <p id="status-text">Loading game files...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="local-sdk.js"></script>
  <script>
    const buildUrl = "Build";
    const loaderUrl = `${buildUrl}/loader.js`;
    const search = new URLSearchParams(window.location.search);

    if (!search.has("useLocalSdk")) {
      search.set("useLocalSdk", "true");
      const newUrl = `${window.location.pathname}?${search.toString()}${window.location.hash}`;
      window.history.replaceState({}, "", newUrl);
    }

    function installGithubPagesSiteLockBypass() {
      const host = window.location.hostname.toLowerCase();
      if (!host.endsWith("github.io")) {
        return;
      }

      const safeUrl = "http://localhost/";
      const defineReadonlyGetter = (target, key, value) => {
        try {
          Object.defineProperty(target, key, {
            configurable: true,
            enumerable: true,
            get: () => value,
          });
        } catch (error) {
          console.warn(`Failed to override ${key}`, error);
        }
      };

      defineReadonlyGetter(document, "URL", safeUrl);
      defineReadonlyGetter(document, "documentURI", safeUrl);

      try {
        const originalCreateElement = document.createElement.bind(document);
        document.createElement = function patchedCreateElement(tagName, options) {
          const element = originalCreateElement(tagName, options);
          if (String(tagName).toLowerCase() === "a") {
            try {
              defineReadonlyGetter(element, "hostname", "localhost");
              defineReadonlyGetter(element, "host", "localhost");
              defineReadonlyGetter(element, "origin", "http://localhost");
              defineReadonlyGetter(element, "protocol", "http:");
            } catch (error) {
              console.warn("Failed to patch anchor element", error);
            }
          }
          return element;
        };
      } catch (error) {
        console.warn("Failed to patch document.createElement", error);
      }

      console.info("GitHub Pages SiteLock compatibility mode enabled");
    }

    installGithubPagesSiteLockBypass();

    const config = {
      dataUrl: `${buildUrl}/build.data`,
      frameworkUrl: `${buildUrl}/build.framework.js`,
      codeUrl: `${buildUrl}/build.wasm`,
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Ericetto",
      productName: "Ragdoll Archers",
      productVersion: "0.1",
      cacheControl(url) {
        if (url.endsWith(".data") || url.endsWith(".wasm")) {
          return "must-revalidate";
        }
        return "no-store";
      },
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const statusText = document.querySelector("#status-text");

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.classList.remove("unity-desktop");
      container.classList.add("unity-mobile");
    }

    if (location.protocol === "file:") {
      statusText.textContent = "Opening from a file. If loading fails, run a simple local web server in this folder.";
    }

    function resumeAudioContexts() {
      const contexts = [];
      if (window.AudioContext && window.__audioContext instanceof window.AudioContext) {
        contexts.push(window.__audioContext);
      }
      for (const context of contexts) {
        if (context.state === "suspended") {
          context.resume().catch(() => {});
        }
      }
    }

    function tryInitLocalSdk() {
      try {
        if (window.CrazyGames && window.CrazyGames.SDK && typeof window.CrazyGames.SDK.init === "function") {
          window.CrazyGames.SDK.init({ debug: false }).catch((error) => {
            console.error("Local CrazySDK init failed", error);
          });
        }
      } catch (error) {
        console.error("Failed to initialize local CrazySDK", error);
      }
    }

    tryInitLocalSdk();
    loadingCover.style.display = "flex";

    const unityLoader = document.createElement("script");
    unityLoader.src = loaderUrl;
    unityLoader.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarEmpty.style.display = "block";
        progressBarFull.style.width = `${Math.round(progress * 100)}%`;
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        loadingCover.style.display = "none";
        statusText.textContent = "";
      }).catch((message) => {
        statusText.textContent = "Game failed to start. Check README.txt for launch help.";
        alert(message);
      });
    };
    unityLoader.onerror = () => {
      statusText.textContent = "Missing loader.js file.";
    };

    document.body.appendChild(unityLoader);

    document.addEventListener("pointerdown", () => {
      container.focus();
      window.focus();
      canvas.focus();
      resumeAudioContexts();
    });

    window.addEventListener("error", (event) => {
      console.error("Window error", event.error || event.message);
    });

    window.addEventListener("unhandledrejection", (event) => {
      console.error("Unhandled promise rejection", event.reason);
    });
  </script>
</body>
</html>
